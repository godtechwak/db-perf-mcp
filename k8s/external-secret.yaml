apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-perf-mcp-external-secret
  namespace: db
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: db-perf-mcp-secret
    creationPolicy: Owner
  data:
    # ── 공통 자격 증명 ──
    - secretKey: db-user
      remoteRef:
        key: devops-dba-dbperf-prd
        property: DB_USER_ID
    - secretKey: db-password
      remoteRef:
        key: devops-dba-dbperf-prd
        property: DB_USER_PW   
    - secretKey: valkey-username
      remoteRef:
        key: devops-dba-dbperf-prd
        property: VALKEY_USERNAME
    - secretKey: valkey-password
      remoteRef:
        key: devops-dba-dbperf-prd
        property: VALKEY_PASSWORD
    - secretKey: databases
      remoteRef:
        key: devops-dba-dbperf-prd
        property: DATABASES
